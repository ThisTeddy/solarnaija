{% load static %}
<!DOCTYPE html>
<html lang="en" x-data="{show:false, loading:false}">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | SolarNaija</title>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config={
            theme:{
                extend:{
                    colors:{
                        primary:"#16a34a",
                        dark:"#0f172a"
                    }
                }
            }
        }
    </script>

</head>

<body class="bg-slate-50 min-h-screen">

<!-- Background -->

<div class="fixed inset-0 -z-10">

    <div class="absolute inset-0 bg-gradient-to-br from-green-50 via-white to-emerald-100"></div>

    <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full bg-green-300/20 blur-3xl"></div>

    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] rounded-full bg-green-200/30 blur-3xl"></div>

</div>


<div class="min-h-screen flex items-center justify-center px-5 py-12">

<div
x-transition
class="bg-white/90 backdrop-blur-xl shadow-2xl rounded-3xl w-full max-w-lg p-8 border border-green-100">

<!-- Logo -->

<div class="text-center">

<div class="inline-flex items-center gap-3">

<div class="h-14 w-14 rounded-2xl bg-green-600 flex items-center justify-center text-white">

<i data-lucide="sun-medium"></i>

</div>

<div>

<h2 class="text-2xl font-bold text-slate-900">

Solar<span class="text-green-600">Naija</span>

</h2>

<p class="text-sm text-slate-500">

Create your account

</p>

</div>

</div>

</div>

<form
    method="POST"
    action="{% url 'register' %}"
    x-data="{ show:false, showConfirm:false, loading:false }"
    @submit="loading=true"
    class="space-y-6"
>

    {% csrf_token %}

    <!-- First Name -->
    <div>
        <label class="block mb-2 font-semibold text-slate-700">
            First Name
        </label>

        <input
            type="text"
            name="first_name"
            required
            class="w-full h-14 rounded-2xl border border-slate-300 px-5 focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="John">
    </div>

    <!-- Last Name -->
    <div>
        <label class="block mb-2 font-semibold text-slate-700">
            Last Name
        </label>

        <input
            type="text"
            name="last_name"
            required
            class="w-full h-14 rounded-2xl border border-slate-300 px-5 focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="Doe">
    </div>

    <!-- Username -->
    <div>
        <label class="block mb-2 font-semibold text-slate-700">
            Username
        </label>

        <input
            type="text"
            name="username"
            required
            class="w-full h-14 rounded-2xl border border-slate-300 px-5 focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="johndoe">
    </div>

    <!-- Email -->
    <div>
        <label class="block mb-2 font-semibold text-slate-700">
            Email Address
        </label>

        <input
            type="email"
            name="email"
            required
            class="w-full h-14 rounded-2xl border border-slate-300 px-5 focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="john@example.com">
    </div>

    <!-- Phone -->
    <div>
        <label class="block mb-2 font-semibold text-slate-700">
            Phone Number
        </label>

        <input
            type="text"
            name="phone"
            class="w-full h-14 rounded-2xl border border-slate-300 px-5 focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="+2348012345678">
    </div>

    <!-- Company -->
    <div>
        <label class="block mb-2 font-semibold text-slate-700">
            Company
        </label>

        <input
            type="text"
            name="company"
            class="w-full h-14 rounded-2xl border border-slate-300 px-5 focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="SolarNaija Ltd">
    </div>

    <!-- Password -->
    <div>

        <label class="block mb-2 font-semibold text-slate-700">
            Password
        </label>

        <div class="relative">

            <input
                :type="show ? 'text' : 'password'"
                name="password"
                required
                class="w-full h-14 rounded-2xl border border-slate-300 px-5 pr-14 focus:ring-2 focus:ring-green-500 outline-none">

            <button
                type="button"
                @click="show=!show"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">

                <span x-show="!show">👁️</span>
                <span x-show="show">🙈</span>

            </button>

        </div>

    </div>

    <!-- Confirm Password -->
    <div>

        <label class="block mb-2 font-semibold text-slate-700">
            Confirm Password
        </label>

        <div class="relative">

            <input
                :type="showConfirm ? 'text' : 'password'"
                name="confirm_password"
                required
                class="w-full h-14 rounded-2xl border border-slate-300 px-5 pr-14 focus:ring-2 focus:ring-green-500 outline-none">

            <button
                type="button"
                @click="showConfirm=!showConfirm"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">

                <span x-show="!showConfirm">👁️</span>
                <span x-show="showConfirm">🙈</span>

            </button>

        </div>

    </div>

    <!-- Terms -->
    <label class="flex items-start gap-3">

        <input
            type="checkbox"
            required
            class="mt-1">

        <span class="text-sm text-slate-600">
            I agree to the Terms & Conditions and Privacy Policy.
        </span>

    </label>

    <!-- Button -->
    <button
        type="submit"
        class="w-full h-14 rounded-2xl bg-green-600 hover:bg-green-700 text-white font-semibold transition">

        <span x-show="!loading">
            Create Account
        </span>

        <span
            x-show="loading"
            class="flex justify-center items-center gap-2">

            <svg
                class="animate-spin h-5 w-5"
                viewBox="0 0 24 24"
                fill="none">

                <circle
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="white"
                    stroke-width="3"
                    opacity=".3"/>

                <path
                    d="M22 12a10 10 0 0 1-10 10"
                    stroke="white"
                    stroke-width="3"/>

            </svg>

            Creating Account...

        </span>

    </button>

</form>

<div class="mt-8 text-center">

    <p class="text-slate-500">

        Already have an account?

        <a
            href="{% url 'login' %}"
            class="font-semibold text-green-600 hover:text-green-700">

            Login

        </a>

    </p>

</div>


<div class="mt-8 text-center text-slate-500">

Already have an account?

<a
href="{% url 'login' %}"
class="text-green-600 font-semibold">

Login

</a>

</div>

</div>

</div>

<script>
lucide.createIcons();
</script>

</body>

</html>
