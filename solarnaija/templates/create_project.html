
{% extends "app.html" %}

{% block title %}New Project{% endblock %}

{% block content %}

<div class="max-w-6xl mx-auto">

    <div class="mb-8">

        <h1 class="text-3xl font-bold text-slate-800">

            Create New Project

        </h1>

        <p class="text-slate-500 mt-2">

            Enter your client's information to begin the solar design.

        </p>

    </div>

    <form
        method="POST"
        class="bg-white rounded-2xl shadow-sm p-8 space-y-8">

        {% csrf_token %}

        <!-- Client Information -->

        <div>

            <h2 class="text-xl font-semibold mb-6">

                Client Information

            </h2>

            <div class="grid md:grid-cols-2 gap-6">

                <div>

                    <label class="block mb-2 font-medium">

                        Client Name

                    </label>

                    <input
                        type="text"
                        name="client_name"
                        required
                        class="w-full h-12 rounded-xl border border-slate-300 px-4">

                </div>

                <div>

                    <label class="block mb-2 font-medium">

                        Email

                    </label>

                    <input
                        type="email"
                        name="email"
                        class="w-full h-12 rounded-xl border border-slate-300 px-4">

                </div>

                <div>

                    <label class="block mb-2 font-medium">

                        Phone

                    </label>

                    <input
                        type="text"
                        name="phone"
                        class="w-full h-12 rounded-xl border border-slate-300 px-4">

                </div>

                <div>

                    <label class="block mb-2 font-medium">

                        Location

                    </label>

                    <input
                        type="text"
                        name="location"
                        required
                        class="w-full h-12 rounded-xl border border-slate-300 px-4">

                </div>

            </div>

        </div>

        <!-- Site Information -->

        <div>

            <h2 class="text-xl font-semibold mb-6">

                Site Details

            </h2>

            <div class="grid md:grid-cols-2 gap-6">

                <div>

                    <label class="block mb-2">

                        Roof Type

                    </label>

                    <select
                        name="roof_type"
                        class="w-full h-12 rounded-xl border border-slate-300 px-4">

                        <option>Flat Roof</option>
                        <option>Pitched Roof</option>
                        <option>Ground Mount</option>

                    </select>

                </div>

                <div>

                    <label class="block mb-2">

                        Roof Area (m²)

                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="roof_area"
                        class="w-full h-12 rounded-xl border border-slate-300 px-4">

                </div>

                <div>

                    <label class="block mb-2">

                        Sun Hours

                    </label>

                    <input
                        type="number"
                        step="0.1"
                        name="sun_hours"
                        value="5.5"
                        class="w-full h-12 rounded-xl border border-slate-300 px-4">

                </div>

                <div>

                    <label class="block mb-2">

                        System Voltage

                    </label>

                    <select
                        name="system_voltage"
                        class="w-full h-12 rounded-xl border border-slate-300 px-4">

                        <option>12</option>
                        <option>24</option>
                        <option selected>48</option>

                    </select>

                </div>

            </div>

        </div>

        <!-- Budget -->

        <div>

            <h2 class="text-xl font-semibold mb-6">

                Budget

            </h2>

            <input
                type="number"
                name="budget"
                class="w-full h-12 rounded-xl border border-slate-300 px-4">

        </div>

        <!-- Notes -->

        <div>

            <label class="block mb-2 font-medium">

                Project Notes

            </label>

            <textarea
                rows="5"
                name="notes"
                class="w-full rounded-xl border border-slate-300 p-4"></textarea>

        </div>

        <!-- Buttons -->

        <div class="flex flex-col md:flex-row gap-4">

            <button
                type="submit"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-semibold">

                Save Project

            </button>

            <a
                href="{% url 'projects' %}"
                class="flex-1 bg-slate-200 hover:bg-slate-300 text-center py-4 rounded-xl">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
