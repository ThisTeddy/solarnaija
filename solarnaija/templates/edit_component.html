
{% extends "app.html" %}

{% block title %}Edit Component{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto">

    <div class="mb-8">

        <h1 class="text-3xl font-bold text-slate-800">

            Edit Component

        </h1>

        <p class="text-slate-500 mt-2">

            Update inventory information.

        </p>

    </div>

    <form method="POST" class="bg-white rounded-2xl shadow-sm p-8">

        {% csrf_token %}

        <div class="grid md:grid-cols-2 gap-6">

            <div>

                <label class="block mb-2 font-medium">

                    Component Name

                </label>

                <input
                    type="text"
                    name="name"
                    value="{{ component.name }}"
                    required
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Category

                </label>

                <select
                    name="category"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

                    <option {% if component.category == "Solar Panel" %}selected{% endif %}>Solar Panel</option>
                    <option {% if component.category == "Battery" %}selected{% endif %}>Battery</option>
                    <option {% if component.category == "Inverter" %}selected{% endif %}>Inverter</option>
                    <option {% if component.category == "Charge Controller" %}selected{% endif %}>Charge Controller</option>
                    <option {% if component.category == "Cable" %}selected{% endif %}>Cable</option>
                    <option {% if component.category == "Mounting Kit" %}selected{% endif %}>Mounting Kit</option>
                    <option {% if component.category == "Accessories" %}selected{% endif %}>Accessories</option>

                </select>

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Brand

                </label>

                <input
                    type="text"
                    name="brand"
                    value="{{ component.brand }}"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Model

                </label>

                <input
                    type="text"
                    name="model"
                    value="{{ component.model }}"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Capacity

                </label>

                <input
                    type="text"
                    name="capacity"
                    value="{{ component.capacity }}"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Voltage

                </label>

                <input
                    type="text"
                    name="voltage"
                    value="{{ component.voltage }}"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Unit Price

                </label>

                <input
                    type="number"
                    step="0.01"
                    name="price"
                    value="{{ component.price }}"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Stock

                </label>

                <input
                    type="number"
                    name="stock"
                    value="{{ component.stock }}"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Manufacturer

                </label>

                <input
                    type="text"
                    name="manufacturer"
                    value="{{ component.manufacturer }}"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Warranty

                </label>

                <input
                    type="text"
                    name="warranty"
                    value="{{ component.warranty }}"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

        </div>

        <div class="mt-6">

            <label class="block mb-2 font-medium">

                Description

            </label>

            <textarea
                rows="5"
                name="description"
                class="w-full rounded-xl border border-slate-300 p-4">{{ component.description }}</textarea>

        </div>

        <div class="mt-10 flex flex-col md:flex-row gap-4">

            <button
                type="submit"
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl">

                Update Component

            </button>

            <a
                href="{% url 'components' %}"
                class="flex-1 bg-slate-200 hover:bg-slate-300 text-center py-4 rounded-xl">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
