
{% extends "app.html" %}

{% block content %}

<div class="max-w-5xl mx-auto">

    <div class="flex items-center justify-between mb-8">

        <div>

            <h1 class="text-3xl font-bold text-gray-800">
                Add Appliance
            </h1>

            <p class="text-gray-500 mt-2">
                {{ project.client_name }}
            </p>

        </div>

        <a href="{% url 'project_detail' project.id %}"
           class="px-5 py-3 rounded-xl bg-gray-200 hover:bg-gray-300">

            Back

        </a>

    </div>

    <form method="POST"
          class="bg-white rounded-2xl shadow p-8">

        {% csrf_token %}

        <div class="grid md:grid-cols-2 gap-6">

            <!-- Category -->

            <div>

                <label class="block mb-2 font-semibold">

                    Category

                </label>

                <select
                    name="category"
                    class="w-full border rounded-xl p-3">

                    <option value="lighting">Lighting</option>

                    <option value="cooling">Cooling</option>

                    <option value="kitchen">Kitchen</option>

                    <option value="office">Office</option>

                    <option value="entertainment">Entertainment</option>

                    <option value="industrial">Industrial</option>

                    <option value="pump">Water Pump</option>

                    <option value="security">Security</option>

                    <option value="other">Other</option>

                </select>

            </div>

            <!-- Appliance -->

            <div>

                <label class="block mb-2 font-semibold">

                    Appliance Name

                </label>

                <input
                    type="text"
                    name="name"
                    required
                    class="w-full border rounded-xl p-3">

            </div>

            <!-- Brand -->

            <div>

                <label class="block mb-2 font-semibold">

                    Brand

                </label>

                <input
                    type="text"
                    name="brand"
                    class="w-full border rounded-xl p-3">

            </div>

            <!-- Model -->

            <div>

                <label class="block mb-2 font-semibold">

                    Model

                </label>

                <input
                    type="text"
                    name="model"
                    class="w-full border rounded-xl p-3">

            </div>

            <!-- Quantity -->

            <div>

                <label class="block mb-2 font-semibold">

                    Quantity

                </label>

                <input
                    type="number"
                    name="quantity"
                    value="1"
                    min="1"
                    required
                    class="w-full border rounded-xl p-3">

            </div>

            <!-- Watts -->

            <div>

                <label class="block mb-2 font-semibold">

                    Rated Power (W)

                </label>

                <input
                    type="number"
                    step="0.1"
                    name="watts"
                    required
                    class="w-full border rounded-xl p-3">

            </div>

            <!-- Surge -->

            <div>

                <label class="block mb-2 font-semibold">

                    Surge Watts

                </label>

                <input
                    type="number"
                    step="0.1"
                    name="surge_watts"
                    value="0"
                    class="w-full border rounded-xl p-3">

            </div>

            <!-- Hours -->

            <div>

                <label class="block mb-2 font-semibold">

                    Hours Per Day

                </label>

                <input
                    type="number"
                    step="0.5"
                    name="hours_per_day"
                    required
                    class="w-full border rounded-xl p-3">

            </div>

            <!-- Days -->

            <div>

                <label class="block mb-2 font-semibold">

                    Days Per Week

                </label>

                <input
                    type="number"
                    value="7"
                    name="days_per_week"
                    class="w-full border rounded-xl p-3">

            </div>

            <!-- PF -->

            <div>

                <label class="block mb-2 font-semibold">

                    Power Factor

                </label>

                <input
                    type="number"
                    step="0.01"
                    value="1"
                    name="power_factor"
                    class="w-full border rounded-xl p-3">

            </div>

        </div>

        <!-- Notes -->

        <div class="mt-6">

            <label class="block mb-2 font-semibold">

                Notes

            </label>

            <textarea
                rows="4"
                name="notes"
                class="w-full border rounded-xl p-3"></textarea>

        </div>

        <div class="mt-8">

            <button
                class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-xl">

                Save Appliance

            </button>

        </div>

    </form>

</div>

{% endblock %}
