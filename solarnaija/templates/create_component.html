
{% extends "app.html" %}

{% block title %}Add Component{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto">

    <div class="mb-8">

        <h1 class="text-3xl font-bold text-slate-800">

            Add Component

        </h1>

        <p class="text-slate-500 mt-2">

            Add a new product to your inventory.

        </p>

    </div>

    <form method="POST" class="bg-white rounded-2xl shadow-sm p-8">

        {% csrf_token %}

        <div class="grid md:grid-cols-2 gap-6">

            <div>

                <label class="block mb-2 font-medium">

                    Component Name

                </label>

                <input
                    type="text"
                    name="name"
                    required
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Category

                </label>

                <select
                    name="category"
                    required
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

                    <option value="">Select Category</option>
                    <option>Solar Panel</option>
                    <option>Battery</option>
                    <option>Inverter</option>
                    <option>Charge Controller</option>
                    <option>Cable</option>
                    <option>Mounting Kit</option>
                    <option>Accessories</option>

                </select>

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Brand

                </label>

                <input
                    type="text"
                    name="brand"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Model

                </label>

                <input
                    type="text"
                    name="model"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Power / Capacity

                </label>

                <input
                    type="text"
                    name="capacity"
                    placeholder="550W, 200Ah, 5kVA..."
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Voltage

                </label>

                <input
                    type="text"
                    name="voltage"
                    placeholder="12V, 24V, 48V..."
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Unit Price (₦)

                </label>

                <input
                    type="number"
                    step="0.01"
                    name="price"
                    required
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Quantity In Stock

                </label>

                <input
                    type="number"
                    name="stock"
                    value="0"
                    required
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Manufacturer

                </label>

                <input
                    type="text"
                    name="manufacturer"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

            <div>

                <label class="block mb-2 font-medium">

                    Warranty

                </label>

                <input
                    type="text"
                    name="warranty"
                    placeholder="5 Years"
                    class="w-full h-12 rounded-xl border border-slate-300 px-4">

            </div>

        </div>

        <div class="mt-6">

            <label class="block mb-2 font-medium">

                Description

            </label>

            <textarea
                rows="5"
                name="description"
                class="w-full rounded-xl border border-slate-300 p-4"></textarea>

        </div>

        <div class="mt-10 flex flex-col md:flex-row gap-4">

            <button
                type="submit"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-semibold">

                Save Component

            </button>

            <a
                href="{% url 'components' %}"
                class="flex-1 bg-slate-200 hover:bg-slate-300 text-center py-4 rounded-xl">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
