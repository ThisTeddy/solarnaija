{% extends "base.html" %}


{% block title %}
Create Project | SolarNaija
{% endblock %}



{% block content %}


<div
class="max-w-5xl mx-auto space-y-8"
x-data="{
    tilt:20,
    autonomy:1
}">


<!-- HEADER -->


<div class="flex flex-col md:flex-row md:items-center justify-between gap-5">


<div>

<h1 class="text-3xl md:text-4xl font-extrabold">

Create Solar Project

</h1>


<p class="text-gray-500 dark:text-gray-400 mt-2">

Setup a new solar installation.

</p>


</div>




<button

onclick="window.location.href='{% url 'projects' %}'"

class="px-5 py-3 rounded-2xl bg-slate-200 dark:bg-slate-800 flex items-center gap-2">


<i data-lucide="arrow-left"></i>

Back


</button>


</div>










<form

method="POST"

class="space-y-8">


{% csrf_token %}









<!-- CLIENT DETAILS -->


<section

class="bg-white dark:bg-slate-900 rounded-3xl border p-6 md:p-8 animate-slide">


<div class="flex items-center gap-3 mb-6">


<div class="p-3 rounded-2xl bg-blue-100 text-primary">

<i data-lucide="user"></i>

</div>


<h2 class="text-xl font-bold">

Client Information

</h2>


</div>





<div class="grid md:grid-cols-2 gap-5">


<div>

<label class="label">

Client Name

</label>


<input

name="client_name"

required

class="input"

placeholder="John Doe">


</div>





<div>

<label class="label">

Email

</label>


<input

type="email"

name="email"

class="input"

placeholder="client@email.com">


</div>





<div>

<label class="label">

Phone

</label>


<input

name="phone"

class="input"

placeholder="+234">


</div>





<div>

<label class="label">

Company

</label>


<input

name="company"

class="input"

placeholder="Company name">


</div>


</div>


</section>









<!-- LOCATION -->


<section

class="bg-white dark:bg-slate-900 rounded-3xl border p-6 md:p-8">


<div class="flex items-center gap-3 mb-6">


<div class="p-3 rounded-2xl bg-green-100 text-green-600">

<i data-lucide="map-pin"></i>

</div>


<h2 class="text-xl font-bold">

Location

</h2>


</div>




<div class="grid md:grid-cols-2 gap-5">



<div>

<label class="label">

Installation Location

</label>


<input

name="location"

required

class="input"

placeholder="Lagos, Nigeria">


</div>




<div>

<label class="label">

Roof Area (m²)

</label>


<input

type="number"

name="roof_area"

class="input"

placeholder="100">


</div>



</div>


</section>









<!-- ROOF -->


<section

class="bg-white dark:bg-slate-900 rounded-3xl border p-6 md:p-8">


<div class="flex items-center gap-3 mb-6">


<div class="p-3 rounded-2xl bg-yellow-100 text-yellow-600">

<i data-lucide="home"></i>

</div>


<h2 class="text-xl font-bold">

Roof Configuration

</h2>


</div>






<div class="grid md:grid-cols-2 gap-6">



<div>

<label class="label">

Roof Type

</label>


<select

name="roof_type"

class="input">


<option value="flat">

Flat

</option>


<option value="pitched">

Pitched

</option>


<option value="metal">

Metal

</option>


</select>


</div>






<div>


<label class="label">

Roof Orientation

</label>


<select

name="roof_orientation"

class="input">


<option>

South

</option>


<option>

East

</option>


<option>

West

</option>


</select>


</div>



</div>








<div class="mt-8">


<label class="label">

Roof Tilt:

<span x-text="tilt"></span>°

</label>



<input

type="range"

min="0"

max="60"

x-model="tilt"

name="roof_tilt"

class="w-full accent-blue-600">


</div>


</section>









<!-- SYSTEM -->


<section

class="bg-white dark:bg-slate-900 rounded-3xl border p-6 md:p-8">



<div class="flex items-center gap-3 mb-6">


<div class="p-3 rounded-2xl bg-purple-100 text-purple-600">

<i data-lucide="battery-charging"></i>

</div>


<h2 class="text-xl font-bold">

Solar System

</h2>


</div>







<div class="grid md:grid-cols-3 gap-5">



<div>


<label class="label">

System Type

</label>


<select

name="system_type"

class="input">


<option value="hybrid">

Hybrid

</option>


<option value="offgrid">

Off Grid

</option>


<option value="ongrid">

On Grid

</option>


</select>


</div>







<div>


<label class="label">

System Voltage

</label>


<select

name="system_voltage"

class="input">


<option value="12">

12V

</option>


<option value="24">

24V

</option>


<option value="48">

48V

</option>


</select>


</div>







<div>


<label class="label">

Sun Hours

</label>


<input

type="number"

step="0.1"

name="sun_hours"

value="5"

class="input">


</div>



</div>










<div class="mt-8">


<label class="label">

Battery Autonomy:

<span x-text="autonomy"></span>

day(s)

</label>



<input

type="range"

min="1"

max="7"

x-model="autonomy"

name="battery_autonomy"

class="w-full accent-blue-600">


</div>



</section>









<!-- NOTES -->


<section

class="bg-white dark:bg-slate-900 rounded-3xl border p-6 md:p-8">


<label class="label">

Project Notes

</label>


<textarea

name="notes"

rows="5"

class="input"

placeholder="Additional information..."></textarea>


</section>









<!-- ACTION -->


<div class="flex flex-col md:flex-row gap-4">


<button

type="submit"

class="flex-1 py-4 rounded-2xl bg-primary text-white font-bold flex items-center justify-center gap-2 hover:scale-[1.02] transition">


<i data-lucide="save"></i>

Create Project


</button>





<button

type="button"

onclick="window.location.href='{% url 'projects' %}'"

class="px-8 py-4 rounded-2xl bg-slate-200 dark:bg-slate-800">


Cancel


</button>



</div>







</form>


</div>


{% endblock %}
